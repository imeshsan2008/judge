    body {

      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 900px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .title {

      font-weight: 700;
      text-align: center;
      margin-bottom: 15px;
    }

    #bookingCount {

      margin-bottom: 10px;

    }

    #calendarWrapper {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    #calendar {
      min-width: 500px;
    }

    button {
      display: block;
      margin: auto;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #932F2F;
      color: white;
      cursor: pointer;
      margin-bottom: 15px;

    button:hover {
      background: #932F2F;
    }

    #filters {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      gap: 10px;
    }

    #filters input,
    #filters select {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .loading {
      cursor: wait;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #932F2F;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }


    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
    .mini-card:hover{
      transform: translateY(-5px);
    }
.dashboard-cards{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:15px;
}


.mini-card{

align-items:center;

background:#fff;

border-radius:10px;

.icon{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;

border-radius:8px;
}

.text{
flex:1;
display:flex;
flex-direction:column;
gap:4px;
}

.text span{
font-weight:600;
font-size:18px;
}

.text small{
font-size:12px;
color:#777;
}

.progress{
width:100%;
height:6px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:4px;
}

.progress-bar{
height:100%;
width:0%;
background:#4f46e5;
transition:width .6s ease;
}
.fc-daygrid-event-harness:hover{
  transform: scale(1.05);
  transition: all 0.3s ease;
  cursor: pointer;
}/* Mobile */

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
function updateCard(current,total,textId,progressId){

let percent=(current/total)*100

document.getElementById(textId).innerText=current+" / "+total

let bar=document.getElementById(progressId)

bar.style.width=percent+"%"

if(percent>=100){
bar.style.background="#22c55e"
}
else if(percent>=80){
bar.style.background="#f59e0b"
}
else{
bar.style.background="#4f46e5"
}

}
async function refreshSheetData(){

// save scroll position
let scrollPos = window.scrollY;

allEvents = [];

for (const sheet of allSheetNames) {

const sheetData = await fetchSheetData(sheet);

if (sheetData.length === 0) continue;

sheetData.forEach(row => {

if (!row.Name || !row.Date || !row['Judges Id']) return;

let datesArray;

try{
datesArray = JSON.parse(row.Date);
if(!Array.isArray(datesArray)) datesArray=[datesArray];
}
catch{
datesArray=[row.Date];
}

datesArray.forEach(date=>{

allEvents.push({
title: row.Name,
start: date,
allDay:true,

color: sheet==="Public Sector" ? "#ff9800"
: sheet==="Manufacturing Sector" ? "#2196f3"
: "#9c27b0",

extendedProps:{
email: row.Email,
judgeNumber: row['Judges Id'],
time: row['Time Stamp'],
sector: row.Sector,
allDates: datesArray.join(", "),
sheetName: sheet
}

});

});

});

}

updateBookingCount();



}
      const calendarEl = document.getElementById('calendar');
      const bookingCountEl = document.getElementById('bookingCountText');
      
      const publicSectorCountEl = document.getElementById('publicSectorCount');
      const manufacturingSectorCountEl = document.getElementById('manufacturingSectorCount');
      const schoolSectorCountEl = document.getElementById('schoolSectorCount');

      const MAX_JUDGES = 200;
      let allEvents = [];
      const minDate = '2026-03-23';
      const maxDate = '2026-04-10';
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth'
        },
        validRange: {
          start: minDate,
          end: new Date(new Date(maxDate).setDate(new Date(maxDate).getDate() + 1))

        },
        events: [],
        eventClick: function (info) {
          const judge = info.event.extendedProps;
          Swal.fire({
            title: `Judge: ${info.event.title}`,
            html: `
          <table style="width:100%">
          <tr><td><b>NIC Number:</b></td><td>${judge.judgeNumber}</td></tr>
          <tr><td><b>Email:</b></td><td>${judge.email}</td></tr>
          <tr><td><b>Sector:</b></td><td>${judge.sheetName || 'N/A'} </td></tr>
          <tr><td><b>Booked Dates:</b></td><td>${judge.allDates}</td></tr>
          <tr><td><b>Submitted Time:</b></td><td>${judge.time}</td></tr>
        </table>`,
            icon: 'info',
            confirmButtonText: 'Close'
          });
        }
      });

      calendar.render();

function updateBookingCount() {

const events = calendar.getEvents();

const uniqueAll = new Set();
const uniquePublic = new Set();
const uniqueManufacturing = new Set();
const uniqueSchool = new Set();

events.forEach(ev => {

let id = ev.extendedProps.judgeNumber;
let sector = ev.extendedProps.sheetName;

uniqueAll.add(id);

if(sector === "Public Sector") uniquePublic.add(id);
if(sector === "Manufacturing Sector") uniqueManufacturing.add(id);
if(sector === "School Sector") uniqueSchool.add(id);

});

// All Judges
updateCard(uniqueAll.size, MAX_JUDGES, 'bookingCountText', 'progressAll');

// Public Sector
updateCard(uniquePublic.size, MAX_JUDGES, 'publicSectorCount', 'progressPublic');

// Manufacturing Sector
updateCard(uniqueManufacturing.size, MAX_JUDGES, 'manufacturingSectorCount', 'progressManufacturing');

// School Sector
updateCard(uniqueSchool.size, MAX_JUDGES, 'schoolSectorCount', 'progressSchool');

}

      function renderFilteredEvents(nameFilter = '', sheetFilter = '') {
        calendar.getEventSources().forEach(src => src.remove());
        let filtered = allEvents.filter(ev => {
          return (!nameFilter || ev.title.toLowerCase().includes(nameFilter.toLowerCase()) || ev.extendedProps.judgeNumber.toLowerCase().includes(nameFilter.toLowerCase())) &&
            (!sheetFilter || ev.extendedProps.sheetName === sheetFilter);
        });
        calendar.addEventSource(filtered);
      }

      // Google Sheet Config
      const SHEET_ID = "13jh3NJQ2uQ6Br6MyVcaf9zv6Bf3YmYjedOq8l1LfuRs";
      const API_KEY = "AIzaSyDrithfbnZYB1WCN7iNGhILGXBukXJv-Ps";

      const allSheetNames = ["Public Sector", "Manufacturing Sector", "School Sector"]; // list all sheet names here

      async function fetchSheetData(sheetName = "") {
        try {
          const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${sheetName}?key=${API_KEY}`;
          const res = await fetch(url);
          const data = await res.json();
          if (!data.values || data.values.length < 2) return [];
          const headers = data.values[0];
          const rows = data.values.slice(1);
          return rows.map(r => {
            let obj = {};
            headers.forEach((h, i) => obj[h] = r[i]);
            obj.sheetName = sheetName;
            return obj;
          });
        } catch (err) {
          console.error(err);
          return [];
        }
      }

      // Auto-load all sheets
      for (const sheet of allSheetNames) {
        const sheetData = await fetchSheetData(sheet);
        if (sheetData.length === 0) continue;

        const events = [];
        sheetData.forEach(row => {
          if (!row.Name || !row.Date || !row['Judges Id']) return;
          let datesArray;
          try { datesArray = JSON.parse(row.Date); if (!Array.isArray(datesArray)) datesArray = [datesArray]; }
          catch { datesArray = [row.Date]; }

          datesArray.forEach(date => {
            events.push({
              title: row.Name,
              start: date,
              allDay: true,
              color: row.sheetName === "Public Sector" ? "#ff9800" :
                row.sheetName === "Manufacturing Sector" ? "#2196f3" :
                  "#9c27b0",
              extendedProps: {
                email: row.Email,
                judgeNumber: row['Judges Id'],
                time: row['Time Stamp'],
                sector: row.Sector,
                allDates: datesArray.join(", "),
                sheetName: row.sheetName
              }
            });
          });
        });
        allEvents = [...allEvents, ...events];
      }

      renderFilteredEvents();
      refreshSheetData();
      setInterval(refreshSheetData,15000)
      document.querySelector(".loading").style.display = "none";
      document.getElementById("calendar").style.display = "block";
      // loader hide
      document.querySelector(".loading").style.display = "none";
      document.getElementById("calendar").style.display = "block";

      // Keep filters functional
      document.getElementById('searchName').addEventListener('input', function () {
        renderFilteredEvents(this.value, document.getElementById('filterSheet').value);
      });
      document.getElementById('filterSheet').addEventListener('change', function () {
        renderFilteredEvents(document.getElementById('searchName').value, this.value);
      });
      
    });
  </script>
